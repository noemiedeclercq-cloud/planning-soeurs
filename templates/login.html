<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Connexion - Planning des taches</title>
<style>
  :root{
    --bg:#f7f7fb; --card:#fff; --text:#1f2430; --muted:#6b7280;
    --line:#e6e8ef; --accent:#3b82f6; --danger:#dc2626;
    --shadow:0 18px 60px rgba(31,36,48,.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);
    background:linear-gradient(180deg,#f7f7fb 0%,#eef4ff 100%);
  }
  .panel{
    width:min(420px,100%);background:var(--card);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);padding:22px;
  }
  h1{margin:0 0 6px;font-size:22px}
  p{margin:0 0 18px;color:var(--muted);font-weight:700;font-size:13px}
  label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin-bottom:6px}
  input{
    width:100%;border:1px solid var(--line);border-radius:12px;
    padding:12px;font-size:14px;outline:none;
  }
  button{
    width:100%;margin-top:14px;border:0;border-radius:12px;padding:12px;
    background:var(--accent);color:#fff;font-weight:900;font-size:14px;cursor:pointer;
  }
  .error{
    margin-top:12px;color:var(--danger);font-size:13px;font-weight:900;
  }
</style>
</head>
<body>
  <form class="panel" method="post">
    <h1>Planning des taches</h1>
    <p>Connexion requise</p>
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
    <button type="submit">Entrer</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</body>
</html>
